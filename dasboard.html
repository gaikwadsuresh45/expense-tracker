<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      padding: 20px;
    }

    h1 { color: #2d5a3d; }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    input, select {
      padding: 8px;
      margin-right: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      padding: 8px 15px;
      background: #2d5a3d;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Mera Expense Tracker</h1>

  <div class="card">
    <h2>Expense Add Karo</h2>
    <input type="text" placeholder="Kya kharch kiya?">
    <input type="number" placeholder="Kitne rupaye?">
    <select>
      <option>Food</option>
      <option>Travel</option>
      <option>Books</option>
      <option>Other</option>
    </select>
    <button>Add Karo</button>
  </div>

  <div class="card">
    <h2>Expense List</h2>
    <p>Abhi koi expense nahi hai.</p>
  </div>

</body>
</html>
